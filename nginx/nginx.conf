events {
    worker_connections 1024;
    multi_accept on;
}

http {

    upstream backend {
        server app-1:8080;
        server app-2:8080;
        keepalive 32;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}