name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 테스트를 먼저 실행해 품질 게이트 역할을 수행한다.
      - name: Run stable CI tests
        run: ./gradlew clean ciTest --info --stacktrace

      # 테스트 성공/실패와 관계없이 JUnit XML 결과를 업로드한다.
      - name: Upload JUnit ciTest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-ci-test-results
          path: build/test-results/ciTest

      # 브라우저에서 확인 가능한 HTML 리포트도 함께 업로드한다.
      - name: Upload HTML ciTest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-ci-test-report
          path: build/reports/tests/ciTest

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # test job에서 이미 검증했으므로 빌드 단계에서는 jar 생성에 집중한다.
      - name: Build application
        run: ./gradlew clean bootJar -x test

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/ticketflow
            git pull origin main
            docker compose up -d --build
            docker image prune -f
