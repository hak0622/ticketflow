name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run stable CI tests
        run: ./gradlew clean ciTest --info --stacktrace

      - name: Upload JUnit ciTest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-ci-test-results
          path: build/test-results/ciTest

      - name: Upload HTML ciTest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-ci-test-report
          path: build/reports/tests/ciTest

  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # GitHub Actions에서 JAR 빌드 (EC2에서 빌드하지 않음)
      - name: Build JAR
        run: ./gradlew clean bootJar -x test

      # Docker Hub 로그인
      - name: Docker Hub login
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      # .dockerignore가 build/ 폴더를 제외하므로 JAR을 루트로 복사 후 빌드
      - name: Build & Push Docker image
        run: |
          cp build/libs/*.jar app.jar
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ticketflow:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ticketflow:latest

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # EC2는 빌드 없이 Docker Hub에서 이미지를 받아서 실행
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/ticketflow
            git pull origin main
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ticketflow:latest
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
