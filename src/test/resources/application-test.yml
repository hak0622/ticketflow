spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis: {}

  task:
    scheduling:
      enabled: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret
            scope:
              - email
              - profile

jwt:
  issuer: test@test.com
  secret_key: dGVzdC1zZWNyZXQta2V5LWZvci10ZXN0aW5nLXB1cnBvc2VzLW9ubHk=

oauth2:
  redirect-url: http://localhost:3000/oauth2/redirect

toss:
  secret-key: test-toss-secret-key
