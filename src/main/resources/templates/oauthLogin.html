<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | StarLecture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            letter-spacing: -0.02em;
            background-color: #f8fafc; /* 메인 페이지의 부드러운 배경색 계열 */
        }

        /* 메인 페이지의 카드 스타일과 통일 */
        .login-card {
            background: #fff;
            padding: 4rem 2.5rem;
            border-radius: 40px; /* 메인 페이지 강의 카드의 둥근 느낌 적용 */
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.08);
            border: 1px solid #f1f5f9;
        }

        /* 구글 버튼을 메인 페이지의 '내 강의장' 버튼처럼 고급스럽게 */
        .google-btn {
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            color: #1e293b;
            font-weight: 800;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .google-btn:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.05);
        }

        .brand-logo {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }

        .brand-logo span {
            color: #2563eb; /* Blue 600 */
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">

<div class="login-card">
    <div class="brand-logo">STAR<span>LECTURE</span></div>

    <p class="text-slate-400 font-bold text-[15px] mb-10 leading-relaxed">
        성장을 위한 첫 걸음,<br>
        소셜 계정으로 간편하게 시작하세요.
    </p>

    <a href="/oauth2/authorization/google" class="google-btn">
        <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"/>
        </svg>
        Google로 시작하기
    </a>

    <div class="mt-12 pt-8 border-t border-slate-100">
        <p class="text-[12px] font-medium text-slate-300">
            © 2026 STARLECTURE. All rights reserved.
        </p>
    </div>
</div>

</body>
</html>
