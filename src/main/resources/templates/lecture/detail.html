<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${lecture.title}">특강 상세</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.02em; }
    </style>
</head>

<!-- ✅ lectureId + openAt(ISO) + status 를 data-attribute로 전달 -->
<body class="bg-[#fafafa] text-[#334155]"
      th:attr="
        data-lecture-id=${lecture.id},
        data-open-at=${#temporals.format(lecture.openAt, 'yyyy-MM-dd''T''HH:mm:ss')},
        data-lecture-status=${lecture.status}
      ">

<nav class="bg-white/80 border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-2xl mx-auto px-6 h-14 flex items-center text-sm">
        <a href="/lectures" class="text-gray-400 hover:text-gray-900 flex items-center gap-1">← 돌아가기</a>
    </div>
</nav>

<main class="max-w-2xl mx-auto px-6 py-12">
    <div class="bg-white border border-gray-100 rounded-2xl p-8 md:p-12 shadow-sm">
        <div class="mb-10">
            <h1 th:text="${lecture.title}" class="text-2xl md:text-3xl font-bold text-gray-900 mb-4">특강 제목</h1>
            <p class="text-gray-500 leading-relaxed text-sm md:text-base">
                본 특강은 선착순 대기열 기반으로 진행됩니다. <br>
                정해진 시간에 신청 버튼을 눌러주세요.
            </p>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-10">
            <div class="p-5 bg-gray-50 rounded-xl text-center">
                <p class="text-[10px] text-gray-400 mb-1 uppercase tracking-wider">시작 시간</p>
                <p th:text="${#temporals.format(lecture.openAt, 'yyyy.MM.dd (E) HH:mm')}"
                   class="font-bold text-gray-700 text-sm md:text-base">
                </p>
            </div>
            <div class="p-5 bg-gray-50 rounded-xl text-center">
                <p class="text-[10px] text-gray-400 mb-1 uppercase tracking-wider">제한 인원</p>
                <p class="font-bold text-gray-700 text-sm md:text-base">
                    <span th:text="${lecture.capacity}">300</span>명
                </p>
            </div>
        </div>

        <div class="space-y-6 text-center">
            <!-- 신청(대기열 등록) 버튼 -->
            <button id="applyBtn"
                    class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 rounded-xl shadow-md shadow-blue-100 transition-all active:scale-[0.98] disabled:bg-gray-200 disabled:text-gray-400 disabled:shadow-none"
                    type="button">
                신청하기
            </button>

            <!-- ✅ 상태/카운트다운 안내 영역(오픈 전/마감/정원마감) -->
            <div id="availabilityArea" class="hidden">
                <div class="bg-gray-50 border border-gray-100 rounded-xl p-4 text-left">
                    <p id="availabilityText" class="text-sm text-gray-700 font-semibold"></p>
                    <p id="countdownText" class="text-xs text-gray-500 mt-1"></p>
                </div>
            </div>

            <div id="resultArea" class="hidden animate-in fade-in duration-500">
                <div class="bg-blue-50/50 border border-blue-100 rounded-xl p-6">
                    <div id="loadingSpinner" class="flex justify-center mb-3">
                        <div class="w-5 h-5 border-2 border-blue-400 border-t-transparent rounded-full animate-spin"></div>
                    </div>

                    <p id="resultText" class="text-sm font-medium text-gray-600 leading-relaxed">
                        대기열 등록 중...
                    </p>

                    <!-- 이어하기 UI -->
                    <div id="resumeArea" class="hidden mt-4">
                        <p class="text-xs text-gray-500 mb-3">
                            진행 중인 대기열이 있습니다. 이어서 상태를 확인할까요?
                        </p>
                        <div class="flex gap-2">
                            <button id="resumeBtn" type="button"
                                    class="flex-1 bg-white border border-gray-200 hover:border-gray-300 text-gray-700 font-semibold py-2 rounded-lg">
                                이어하기
                            </button>
                            <button id="restartBtn" type="button"
                                    class="flex-1 bg-gray-900 hover:bg-gray-800 text-white font-semibold py-2 rounded-lg">
                                새로 신청
                            </button>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>
</main>

<!-- ✅ 캐시 무력화: token.js 변경이 즉시 반영되게 -->
<script th:src="@{/js/token.js(v=${#dates.createNow().time})}"></script>

<script>
    // token이 쿼리에 붙어오는 경우 저장/정리
    if (window.Token) Token.saveTokenFromUrl();

    const lectureId = document.body.dataset.lectureId;
    const lectureStatus = (document.body.dataset.lectureStatus || "").toUpperCase();
    const openAtIso = document.body.dataset.openAt; // "yyyy-MM-ddTHH:mm:ss"

    const applyBtn = document.getElementById("applyBtn");
    const resultArea = document.getElementById("resultArea");
    const resultText = document.getElementById("resultText");
    const spinner = document.getElementById("loadingSpinner");

    const resumeArea = document.getElementById("resumeArea");
    const resumeBtn = document.getElementById("resumeBtn");
    const restartBtn = document.getElementById("restartBtn");

    const availabilityArea = document.getElementById("availabilityArea");
    const availabilityText = document.getElementById("availabilityText");
    const countdownText = document.getElementById("countdownText");

    const timerKey = `lecture:${lectureId}:applyStartAt`;
    let pollTimer = null;

    // ✅ 오픈 카운트다운 타이머
    let openCountdownTimer = null;

    function setApplyDisabled(disabled) {
      applyBtn.disabled = disabled;
      applyBtn.classList.toggle("opacity-50", disabled);
      applyBtn.classList.toggle("cursor-not-allowed", disabled);
    }

    function showResult(html, showSpinner = true) {
      resultArea.classList.remove("hidden");
      spinner.classList.toggle("hidden", !showSpinner);
      resultText.innerHTML = html;
    }

    function hideResult() {
      resultArea.classList.add("hidden");
      resumeArea.classList.add("hidden");
    }

    function stopPolling() {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = null;
    }

    function stopOpenCountdown() {
      if (openCountdownTimer) clearInterval(openCountdownTimer);
      openCountdownTimer = null;
    }

    function ensureLoggedIn() {
      if (!window.Token || !Token.getToken()) {
        setApplyDisabled(true);
        showResult("로그인이 필요합니다. 로그인 후 다시 시도해주세요.", false);
        return false;
      }
      return true;
    }

    async function fetchMyQueueStatus() {
      return Token.apiFetch(`/api/lectures/${lectureId}/queue/me`, { method: "GET" });
    }

    // ✅ ENROLLED 상태 UI 공통 처리 함수
    function renderEnrolled(message) {
      stopPolling();
      stopOpenCountdown();
      resumeArea.classList.add("hidden");
      spinner.classList.add("hidden");
      resultArea.classList.remove("hidden");

      availabilityArea.classList.add("hidden");

      resultText.innerHTML = `
        <div class="mb-2">✅</div>
        <span class="text-gray-900 font-bold text-lg">신청 완료</span><br>
        <span class="text-xs text-gray-500">${message || "이미 신청한 강의입니다."}</span>
      `;

      applyBtn.textContent = "신청 완료";
      setApplyDisabled(true);
      localStorage.removeItem(timerKey);
    }

    function applyAvailabilityInit() {
  stopOpenCountdown();

  // CLOSED / SOLD_OUT이면 즉시 차단
  if (lectureStatus === "CLOSED") {
    setApplyDisabled(true);
    applyBtn.textContent = "마감";
    availabilityArea.classList.remove("hidden");
    availabilityText.textContent = "마감된 강의입니다.";
    countdownText.textContent = "신청이 불가능합니다.";
    hideResult();
    return false;
  }

  if (lectureStatus === "SOLD_OUT") {
    setApplyDisabled(true);
    applyBtn.textContent = "정원 마감";
    availabilityArea.classList.remove("hidden");
    availabilityText.textContent = "정원이 마감되었습니다.";
    countdownText.textContent = "다음 기회를 기다려주세요.";
    hideResult();
    return false;
  }

  // openAt 없으면 바로 신청 가능
  if (!openAtIso) {
    availabilityArea.classList.add("hidden");
    applyBtn.textContent = "신청하기";
    setApplyDisabled(false);
    return true;
  }

  const openAtMs = new Date(openAtIso).getTime();
  if (Number.isNaN(openAtMs)) {
    // 파싱 실패 시 안전하게 막지 않고(혹은 막고) 처리 선택 가능
    availabilityArea.classList.add("hidden");
    applyBtn.textContent = "신청하기";
    setApplyDisabled(false);
    return true;
  }

  // ✅ 이미 오픈된 경우: 카운트다운 타이머를 만들지 말고 바로 true
  if (Date.now() >= openAtMs) {
    availabilityArea.classList.add("hidden");
    applyBtn.textContent = "신청하기";
    setApplyDisabled(false);
    return true;
  }

  // ✅ 아직 오픈 전인 경우에만 카운트다운 interval 실행
  const tick = () => {
    const diff = openAtMs - Date.now();

    if (diff > 0) {
      setApplyDisabled(true);
      applyBtn.textContent = "오픈 예정";

      availabilityArea.classList.remove("hidden");
      availabilityText.textContent = "아직 오픈 전입니다.";

      const s = Math.floor(diff / 1000);
      const hh = String(Math.floor(s / 3600)).padStart(2, "0");
      const mm = String(Math.floor((s % 3600) / 60)).padStart(2, "0");
      const ss = String(s % 60).padStart(2, "0");
      countdownText.textContent = `오픈까지 ${hh}:${mm}:${ss}`;

      hideResult();
      return;
    }

    // 오픈 시간 도달
    stopOpenCountdown();
    availabilityArea.classList.add("hidden");
    applyBtn.textContent = "신청하기";
    setApplyDisabled(false);

    // ❌ 여기서 showResumeIfInProgress() 호출하지 말 것 (무한 루프 원인)
    // 필요한 경우, 사용자가 버튼 누르거나, load에서 한 번만 호출하도록 둔다.
  };

  tick();
  openCountdownTimer = setInterval(tick, 1000);
  return false; // 아직 오픈 전
}

    async function showResumeIfInProgress() {
      // ✅ 신청 가능 상태가 아니면(오픈 전/마감 등) 큐 조회 자체를 하지 않음
      if (!applyAvailabilityInit()) return;

      if (!ensureLoggedIn()) return;

      try {
        const data = await fetchMyQueueStatus();

        // ✅ ENROLLED 처리
        if (data.status === "ENROLLED") {
          renderEnrolled(data.message);
          return;
        }

        if (data.status === "QUEUED") {
          spinner.classList.add("hidden");
          resultArea.classList.remove("hidden");
          resumeArea.classList.remove("hidden");
          resultText.innerHTML = `
            <span class="text-gray-900 font-semibold">진행 중인 대기열이 있습니다.</span><br>
            <span class="text-xs text-gray-500">이어하기를 누르면 현재 대기 상태를 확인합니다.</span>
          `;
          setApplyDisabled(false);
          return;
        }

        if (data.status === "ADMITTED") {
          showResult("✅ 입장 권한이 있습니다. 결제 페이지로 이동합니다...", true);
          localStorage.setItem(timerKey, String(Date.now()));
          setTimeout(() => location.href = `/lectures/${lectureId}/apply`, 400);
          return;
        }

        // NOT_IN_QUEUE 등
        resumeArea.classList.add("hidden");
        setApplyDisabled(false);

      } catch (e) {
        // 오류가 있어도 버튼은 살려둠
        resumeArea.classList.add("hidden");
        setApplyDisabled(false);
      }
    }

    function startPolling() {
      // ✅ 신청 가능 상태가 아니면 폴링 금지
      if (!applyAvailabilityInit()) return;

      if (!ensureLoggedIn()) return;

      setApplyDisabled(true);
      resumeArea.classList.add("hidden");
      showResult("대기 상태를 확인 중...", true);

      if (pollTimer) return;

      pollTimer = setInterval(async () => {
        try {
          const data = await fetchMyQueueStatus();

          // ✅ ENROLLED 처리
          if (data.status === "ENROLLED") {
            renderEnrolled(data.message);
            return;
          }

          if (data.status === "QUEUED") {
            spinner.classList.remove("hidden");
            resultText.innerHTML = `
              <span class="text-blue-600 font-bold block mb-1">입장 대기 중</span>
              <span class="text-xs text-gray-400">현재 내 순번: </span>
              <span class="text-gray-900 font-bold text-lg">${data.position}번</span>
              <p class="text-[10px] text-gray-400 mt-1">대기열 인원: ${data.total}명</p>
            `;
            return;
          }

          if (data.status === "ADMITTED") {
            spinner.classList.add("hidden");
            resultText.innerHTML = `
              <div class="animate-bounce mb-2">✅</div>
              <span class="text-green-600 font-bold text-lg">입장이 가능합니다!</span><br>
              <span class="text-xs text-gray-500">결제 페이지로 이동합니다...</span>
            `;
            stopPolling();

            localStorage.setItem(timerKey, String(Date.now()));

            setTimeout(() => {
              location.href = `/lectures/${lectureId}/apply`;
            }, 600);

            return;
          }

          // NOT_IN_QUEUE
          spinner.classList.add("hidden");
          resultText.innerHTML = `
            <span class="text-orange-500 font-bold">대기열 정보가 없습니다.</span><br>
            <span class="text-xs text-gray-400">다시 신청하기 버튼을 눌러주세요.</span>
          `;
          stopPolling();
          localStorage.removeItem(timerKey);
          setApplyDisabled(false);
          resumeArea.classList.add("hidden");

        } catch (e) {
          spinner.classList.add("hidden");
          resultText.innerHTML = "<span class='text-red-500 text-xs'>오류가 발생했습니다. 새로고침 후 다시 시도해주세요.</span>";
          stopPolling();
          setApplyDisabled(false);
        }
      }, 1500);
    }

    async function enqueueNew() {
      // ✅ 신청 가능 상태가 아니면 enqueue 금지
      if (!applyAvailabilityInit()) return;

      if (!ensureLoggedIn()) return;

      setApplyDisabled(true);
      resumeArea.classList.add("hidden");
      showResult("대기열 등록 중...", true);

      try {
        const data = await Token.apiFetch(`/api/lectures/${lectureId}/queue`, { method: "POST" });

        // ✅ ENROLLED 처리
        if (data.status === "ENROLLED") {
          renderEnrolled(data.message);
          return;
        }

        if (data.status === "QUEUED") {
          startPolling();
          return;
        }

        spinner.classList.add("hidden");
        resultText.innerHTML = "<span class='text-red-400 text-xs'>처리 중 문제가 발생했습니다. 다시 시도해주세요.</span>";
        setApplyDisabled(false);

      } catch (e) {
        spinner.classList.add("hidden");

        // ✅ 서버에서 openAt 전/마감/정원마감이 내려오는 경우(403/409)도 여기로 들어올 수 있음
        const msg = String(e.message || "");
        if (msg.includes("UNAUTHORIZED")) {
          resultText.innerHTML = "<span class='text-red-500 text-xs'>로그인이 만료되었습니다. 다시 로그인해주세요.</span>";
          setApplyDisabled(true);
        } else if (msg.includes("오픈") || msg.includes("마감") || msg.includes("정원")) {
          resultText.innerHTML = `<span class='text-gray-700 text-sm font-semibold'>${msg}</span>`;
          setApplyDisabled(true);
        } else {
          resultText.innerHTML = "<span class='text-red-400 text-xs'>오류가 발생했습니다.</span>";
          setApplyDisabled(false);
        }
      }
    }

    // 이벤트 바인딩
    applyBtn.addEventListener("click", () => {
      stopPolling();
      enqueueNew();
    });

    resumeBtn.addEventListener("click", () => {
      resumeArea.classList.add("hidden");
      startPolling();
    });

    restartBtn.addEventListener("click", () => {
      stopPolling();
      localStorage.removeItem(timerKey);
      resumeArea.classList.add("hidden");
      enqueueNew();
    });

    // 초기 로드
    window.addEventListener("load", () => {
      // ✅ openAt / status 기준으로 버튼 먼저 세팅
      const canApplyNow = applyAvailabilityInit();

      // ✅ 신청 가능 상태일 때만 이어하기 검사
      if (canApplyNow) {
        showResumeIfInProgress();
      }
    });
</script>

</body>
</html>
