<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>신청 완료 - 성공</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.02em; }
        .receipt-edge {
            background-image: radial-gradient(circle at 10px -1px, transparent 10px, white 10.5px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-700">

<nav class="bg-white/80 border-b border-slate-100 sticky top-0 z-50 backdrop-blur-md">
    <div class="max-w-xl mx-auto px-6 h-16 flex items-center justify-center">
        <span class="font-bold text-slate-900">신청 확인서</span>
    </div>
</nav>

<main class="max-w-xl mx-auto px-6 py-12">
    <div class="text-center mb-10 animate-in fade-in zoom-in duration-700">
        <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg shadow-green-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
            </svg>
        </div>
        <h1 class="text-2xl font-black text-slate-900">신청이 완료되었습니다!</h1>
        <p class="text-slate-400 mt-2">소중한 기회를 잡으셨네요. 축하드립니다!</p>
    </div>

    <div id="card" class="hidden animate-in slide-in-from-bottom-6 duration-700 delay-200">
        <div class="bg-white rounded-t-3xl p-8 border-x border-t border-slate-100 shadow-sm">
            <div class="space-y-6">
                <div>
                    <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1">Course Title</p>
                    <p id="title" class="text-lg font-bold text-slate-900 leading-tight"></p>
                </div>

                <div class="grid grid-cols-2 gap-4 pt-4 border-t border-dashed border-slate-200">
                    <div>
                        <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1">Date</p>
                        <p id="createdAt" class="text-sm font-semibold text-slate-700"></p>
                    </div>
                    <div>
                        <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1">Order No.</p>
                        <p id="enrollmentId" class="text-sm font-semibold text-slate-700"></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="relative h-4 bg-white border-x border-slate-100 flex items-center">
            <div class="absolute -left-3 w-6 h-6 bg-slate-50 rounded-full border border-slate-100"></div>
            <div class="w-full border-t border-dashed border-slate-200 mx-3"></div>
            <div class="absolute -right-3 w-6 h-6 bg-slate-50 rounded-full border border-slate-100"></div>
        </div>

        <div class="bg-white rounded-b-3xl p-6 border-x border-b border-slate-100 shadow-md text-center">
            <div class="inline-flex items-center gap-2 px-4 py-2 bg-green-50 rounded-full">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-xs font-bold text-green-700">신청 확정됨 (Confirmed)</span>
            </div>
        </div>
    </div>

    <div id="error" class="hidden bg-white rounded-3xl p-8 text-center shadow-sm border border-red-50">
        <p class="text-3xl mb-3">⚠️</p>
        <p id="errorMsg" class="text-sm text-slate-600 leading-relaxed"></p>
    </div>

    <!-- ✅ 강의 상세 버튼 제거하고 "다른 강의 둘러보기"만 남김 -->
    <div class="mt-10 space-y-3">
        <a href="/lectures" class="block w-full text-center bg-white border border-slate-200 hover:bg-slate-50 text-slate-600 font-bold py-4 rounded-2xl transition-all">
            다른 강의 둘러보기
        </a>
    </div>
</main>

<script th:inline="javascript">
    const lectureId = [[${lecture.id}]];
    const enrolledKey = `lecture:${lectureId}:enrolledUserKey`;

    const card = document.getElementById("card");
    const error = document.getElementById("error");
    const errorMsg = document.getElementById("errorMsg");

    const title = document.getElementById("title");
    const createdAt = document.getElementById("createdAt");
    const enrollmentId = document.getElementById("enrollmentId");

    function formatDate(isoString) {
        if (!isoString) return "-";
        return isoString.replace("T", " ").slice(0, 19);
    }

    const userKey = localStorage.getItem(enrolledKey);

    if (!userKey) {
        error.classList.remove("hidden");
        errorMsg.innerHTML = "신청 내역을 찾을 수 없습니다.<br>목록으로 돌아가 확인해 주세요.";
    } else {
        fetch(`/api/lectures/${lectureId}/enroll/detail?userKey=${encodeURIComponent(userKey)}`)
            .then(res => {
                if (!res.ok) throw new Error();
                return res.json();
            })
            .then(data => {
                title.textContent = data.lectureTitle;
                createdAt.textContent = formatDate(data.createdAt);
                enrollmentId.textContent = "#" + data.enrollmentId;

                card.classList.remove("hidden");

                // ✅ (선택) 조회 성공 후 키 정리
                // receipt 새로고침 시에도 계속 내역 보이고 싶으면 아래 줄 주석처리
                localStorage.removeItem(enrolledKey);
            })
            .catch(() => {
                error.classList.remove("hidden");
                errorMsg.textContent = "내역을 불러오는 중 오류가 발생했습니다.";
            });
    }
</script>

</body>
</html>
