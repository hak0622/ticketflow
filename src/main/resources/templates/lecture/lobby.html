<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강의 로비 | StarLecture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.02em; }
        .lecture-card { transition: all 0.2s ease-in-out; }
        .lecture-card:hover { border-color: #cbd5e1; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="bg-[#fafafa] text-[#334155]">

<nav class="bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-6 h-14 flex items-center justify-between">
        <h1 class="text-lg font-bold text-gray-900">StarLecture</h1>
        <div class="flex gap-8 text-sm text-gray-500">
            <a href="#" class="hover:text-gray-900">강의 목록</a>
            <a href="#" class="hover:text-gray-900">내 정보</a>
        </div>
    </div>
</nav>

<main class="max-w-5xl mx-auto px-6 py-16">
    <div class="mb-12">
        <h2 class="text-2xl font-bold text-gray-900 mb-3">진행 중인 특강</h2>
        <p class="text-gray-400">선착순으로 진행되는 인기 강연을 확인하세요.</p>
    </div>

    <div th:if="${#lists.isEmpty(lectures)}" class="py-20 text-center border rounded-2xl bg-white border-gray-100">
        <p class="text-gray-400">등록된 특강이 없습니다.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div th:each="lecture : ${lectures}" class="lecture-card bg-white border border-gray-100 rounded-xl p-6 flex flex-col justify-between">
            <div>
                <div class="flex items-center gap-2 mb-4">
                    <span class="text-[10px] font-semibold bg-gray-50 text-gray-500 border border-gray-200 px-2 py-0.5 rounded">OFFLINE</span>
                </div>
                <h3 th:text="${lecture.title}" class="text-lg font-bold text-gray-900 mb-2 leading-tight">특강 제목</h3>
                <div class="space-y-1.5 mb-8">
                    <p class="text-sm text-gray-500 flex items-center gap-2">
                        <span class="w-1 h-1 bg-gray-300 rounded-full"></span>
                        오픈: <span th:text="${lecture.openAt}">2026-02-08</span>
                    </p>
                    <p class="text-sm text-gray-500 flex items-center gap-2">
                        <span class="w-1 h-1 bg-gray-300 rounded-full"></span>
                        정원: <span th:text="${lecture.capacity}">300</span>명
                    </p>
                </div>
            </div>
            <a th:href="@{/lectures/{id}(id=${lecture.id})}" class="block w-full text-center py-3 bg-[#f8fafc] hover:bg-gray-100 text-gray-600 font-semibold text-sm rounded-lg transition-colors border border-gray-100">
                신청하기
            </a>
        </div>
    </div>
</main>
</body>
</html>
