<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>내 신청 내역 | StarLecture</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f8fafc;
            --white: #ffffff;
            --border: #e8ecf2;
            --border-soft: #f1f4f8;
            --text: #0f172a;
            --text-2: #475569;
            --text-3: #94a3b8;
            --blue: #3b6bff;
            --blue-soft: #eff4ff;
            --blue-border: #dce8ff;
            --blue-text: #1d4ed8;
            --rose: #e8344e;
            --rose-soft: #fff0f2;
            --green: #16a34a;
            --green-soft: #f0fdf4;
            --amber: #d97706;
            --amber-soft: #fffbeb;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            letter-spacing: -0.02em;
            -webkit-font-smoothing: antialiased;
        }

        /* NAV */
        nav {
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,.92);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            height: 64px;
            display: flex;
            align-items: center;
        }
        .nav-inner {
            max-width: 1120px;
            margin: 0 auto;
            width: 100%;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-left { display: flex; align-items: center; gap: 16px; }
        .nav-logo {
            font-size: 18px; font-weight: 900;
            letter-spacing: -0.05em;
            color: var(--text); text-decoration: none;
        }
        .nav-logo span { color: var(--blue); }
        .nav-divider { width: 1px; height: 18px; background: var(--border); }
        .nav-page {
            font-size: 13px; font-weight: 700;
            color: var(--text-2);
        }
        .nav-back {
            font-size: 13px; font-weight: 600;
            color: var(--text-3); text-decoration: none;
            display: flex; align-items: center; gap: 4px;
            transition: color .15s;
        }
        .nav-back:hover { color: var(--text); }

        /* MAIN */
        main {
            max-width: 1120px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        /* PAGE HEADER */
        .page-header {
            margin-bottom: 32px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
        }
        .page-eyebrow {
            font-size: 11px; font-weight: 800;
            color: var(--blue);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .page-title {
            font-size: 26px; font-weight: 900;
            color: var(--text); letter-spacing: -0.04em;
        }
        .count-chip {
            font-size: 12px; font-weight: 700;
            color: var(--text-3); background: var(--white);
            border: 1px solid var(--border);
            padding: 5px 14px; border-radius: 100px;
            font-family: 'DM Mono', monospace;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 18px;
        }

        /* CARD */
        .card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 0;
            box-shadow: 0 2px 10px rgba(15,23,42,.04);
            transition: transform .2s ease, box-shadow .2s ease;
            cursor: default;
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 36px rgba(59,107,255,.1);
        }

        /* 카드 상단: 배지 + 날짜 */
        .card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .card-date {
            font-size: 11px; font-weight: 600;
            color: var(--text-3);
            font-family: 'DM Mono', monospace;
        }

        /* 제목 */
        .card-title {
            font-size: 16px; font-weight: 800;
            color: var(--text); letter-spacing: -0.03em;
            line-height: 1.4;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 구분선 */
        .card-divider {
            height: 1px;
            background: var(--border-soft);
            margin-bottom: 16px;
        }

        /* 메타 */
        .card-meta {
            display: flex;
            flex-direction: column;
            gap: 9px;
            margin-bottom: 20px;
        }
        .meta-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .meta-label {
            font-size: 11px; font-weight: 700;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .meta-value {
            font-size: 12px; font-weight: 600;
            color: var(--text-2);
            font-family: 'DM Mono', monospace;
        }
        .meta-value-accent {
            font-size: 12px; font-weight: 700;
            color: var(--blue);
            font-family: 'DM Mono', monospace;
        }

        /* 정원 바 */
        .cap-bar-wrap { margin-top: 2px; }
        .cap-bar-bg {
            height: 5px;
            background: var(--border-soft);
            border-radius: 100px;
            overflow: hidden;
            margin-top: 6px;
        }
        .cap-bar-fill {
            height: 100%;
            border-radius: 100px;
            background: var(--blue);
            transition: width .4s ease;
        }
        .cap-bar-fill.full { background: var(--rose); }
        .cap-bar-fill.warn { background: var(--amber); }

        /* 버튼 */
        .card-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 11px;
            border-radius: 12px;
            border: 1.5px solid var(--blue-border);
            background: var(--blue-soft);
            color: var(--blue);
            font-size: 13px; font-weight: 800;
            font-family: 'Pretendard', sans-serif;
            letter-spacing: -0.02em;
            cursor: pointer;
            transition: all .15s;
            text-decoration: none;
        }
        .card-btn:hover { background: #dce8ff; border-color: #b3ceff; }
        .card-btn:active { transform: scale(.97); }

        /* BADGES */
        .badge {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 11px; font-weight: 800;
            padding: 4px 11px; border-radius: 100px;
            letter-spacing: 0.02em; white-space: nowrap;
        }
        .badge::before {
            content: ''; width: 5px; height: 5px;
            border-radius: 50%; flex-shrink: 0;
        }
        .badge-open     { background: var(--blue-soft);  color: var(--blue);   border: 1px solid var(--blue-border); }
        .badge-open::before   { background: var(--blue); }
        .badge-sold     { background: var(--rose-soft);  color: var(--rose);   border: 1px solid #fecdd3; }
        .badge-sold::before   { background: var(--rose); }
        .badge-closed   { background: var(--bg);         color: var(--text-3); border: 1px solid var(--border); }
        .badge-closed::before { background: var(--text-3); }

        /* EMPTY / ERROR */
        .state-box {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 24px;
            background: var(--white);
            border: 1px dashed var(--border);
            border-radius: 24px;
            gap: 12px;
        }
        .state-icon { font-size: 40px; }
        .state-title { font-size: 15px; font-weight: 800; color: var(--text-2); }
        .state-sub   { font-size: 13px; font-weight: 500; color: var(--text-3); }
        .state-link {
            margin-top: 4px;
            font-size: 13px; font-weight: 800;
            color: var(--blue); text-decoration: none;
            border: 1.5px solid var(--blue-border);
            background: var(--blue-soft);
            padding: 9px 20px; border-radius: 10px;
            transition: background .15s;
        }
        .state-link:hover { background: #dce8ff; }

        /* SKELETON */
        @keyframes shimmer {
            0%   { background-position: -600px 0; }
            100% { background-position: 600px 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #f1f4f8 25%, #e8ecf2 50%, #f1f4f8 75%);
            background-size: 600px 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 8px;
        }
        .sk-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            display: flex; flex-direction: column; gap: 12px;
            box-shadow: 0 2px 10px rgba(15,23,42,.04);
        }
        .sk-line { height: 12px; }
        .sk-title { height: 18px; width: 80%; }
        .sk-badge { height: 22px; width: 70px; border-radius: 100px; }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <div class="nav-left">
            <a href="/lectures" class="nav-logo">STAR<span>LECTURE</span></a>
            <div class="nav-divider"></div>
            <span class="nav-page">내 신청 내역</span>
        </div>
        <a href="/lectures" class="nav-back">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 16 16">
                <path d="M10 12L6 8l4-4"/>
            </svg>
            강의 목록으로
        </a>
    </div>
</nav>

<main>
    <div class="page-header">
        <div>
            <div class="page-eyebrow">My Enrollments</div>
            <div class="page-title">내 신청 내역</div>
        </div>
        <span id="countChip" class="count-chip" style="display:none"></span>
    </div>

    <div id="grid" class="grid">
        <!-- 스켈레톤 -->
        <div class="sk-card">
            <div class="sk-badge skeleton"></div>
            <div class="sk-title skeleton"></div>
            <div class="sk-line skeleton" style="width:60%"></div>
            <div class="sk-line skeleton" style="width:75%"></div>
        </div>
        <div class="sk-card">
            <div class="sk-badge skeleton"></div>
            <div class="sk-title skeleton"></div>
            <div class="sk-line skeleton" style="width:55%"></div>
            <div class="sk-line skeleton" style="width:70%"></div>
        </div>
        <div class="sk-card">
            <div class="sk-badge skeleton"></div>
            <div class="sk-title skeleton"></div>
            <div class="sk-line skeleton" style="width:65%"></div>
            <div class="sk-line skeleton" style="width:50%"></div>
        </div>
    </div>
</main>

<script>
    function badge(status) {
        const s = (status || '').toUpperCase();
        if (s === 'OPEN')     return `<span class="badge badge-open">OPEN</span>`;
        if (s === 'SOLD_OUT') return `<span class="badge badge-sold">SOLD OUT</span>`;
        if (s === 'CLOSED')   return `<span class="badge badge-closed">CLOSED</span>`;
        return `<span class="badge badge-closed">${status}</span>`;
    }

    function fmtDate(s) {
        if (!s) return '—';
        const d = new Date(s);
        if (isNaN(d)) return s;
        const days = ['일', '월', '화', '수', '목', '금', '토'];
        const yyyy = d.getFullYear();
        const mm   = String(d.getMonth() + 1).padStart(2, '0');
        const dd   = String(d.getDate()).padStart(2, '0');
        const day  = days[d.getDay()];
        const hh   = String(d.getHours()).padStart(2, '0');
        const min  = String(d.getMinutes()).padStart(2, '0');
        return `${yyyy}.${mm}.${dd} (${day}) ${hh}:${min}`;
    }

    function capBarClass(enrolled, capacity) {
        const ratio = capacity ? enrolled / capacity : 0;
        if (ratio >= 1)    return 'full';
        if (ratio >= 0.8)  return 'warn';
        return '';
    }

    async function loadMyEnrollments() {
        const token = localStorage.getItem("access_token");
        const grid = document.getElementById("grid");
        const countChip = document.getElementById("countChip");

        try {
            const res = await fetch("/api/me/enrollments", {
                headers: token ? { Authorization: "Bearer " + token } : {}
            });

            if (res.status === 401) {
                grid.innerHTML = `
                    <div class="state-box">
                        <div class="state-icon">🔐</div>
                        <div class="state-title">로그인이 필요합니다</div>
                        <div class="state-sub">내 신청 내역을 보려면 먼저 로그인해주세요.</div>
                        <a href="/login" class="state-link">로그인하기</a>
                    </div>`;
                return;
            }

            const data = await res.json();

            if (!data || data.length === 0) {
                grid.innerHTML = `
                    <div class="state-box">
                        <div class="state-icon">📭</div>
                        <div class="state-title">신청한 강의가 없습니다</div>
                        <div class="state-sub">아직 수강 신청한 강의가 없어요. 지금 바로 둘러보세요!</div>
                        <a href="/lectures" class="state-link">강의 둘러보기</a>
                    </div>`;
                return;
            }

            countChip.textContent = data.length + '개';
            countChip.style.display = 'inline-flex';

            grid.innerHTML = data.map(x => {
                const enrolled = x.enrolledCount ?? 0;
                const capacity = x.capacity ?? 1;
                const pct = Math.min(100, Math.round(enrolled / capacity * 100));
                const barCls = capBarClass(enrolled, capacity);

                return `
                <div class="card">
                    <div class="card-top">
                        ${badge(x.status)}
                        <span class="card-date">#${x.lectureId}</span>
                    </div>

                    <div class="card-title">${x.lectureTitle}</div>

                    <div class="card-divider"></div>

                    <div class="card-meta">
                        <div class="meta-row">
                            <span class="meta-label">오픈</span>
                            <span class="meta-value">${fmtDate(x.openAt)}</span>
                        </div>
                        <div class="meta-row">
                            <span class="meta-label">신청일</span>
                            <span class="meta-value">${fmtDate(x.enrolledAt)}</span>
                        </div>
                        <div class="cap-bar-wrap">
                            <div class="meta-row">
                                <span class="meta-label">정원</span>
                                <span class="meta-value-accent">${enrolled} / ${capacity}</span>
                            </div>
                            <div class="cap-bar-bg">
                                <div class="cap-bar-fill ${barCls}" style="width:${pct}%"></div>
                            </div>
                        </div>
                    </div>

                    <a href="/lectures/${x.lectureId}" class="card-btn">
                        강의 상세 보기
                        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 16 16">
                            <path d="M6 4l4 4-4 4"/>
                        </svg>
                    </a>
                </div>`;
            }).join('');

        } catch (e) {
            grid.innerHTML = `
                <div class="state-box">
                    <div class="state-icon">⚠️</div>
                    <div class="state-title">불러오기 실패</div>
                    <div class="state-sub">잠시 후 다시 시도해주세요.</div>
                </div>`;
        }
    }

    loadMyEnrollments();
</script>
</body>
</html>
