<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${lecture.title} + ' - 결제'">결제</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.02em; }
        .timer-glow { box-shadow: 0 0 15px rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="bg-[#f8fafc] text-[#334155]">

<nav class="bg-white/80 border-b border-slate-100 sticky top-0 z-50 backdrop-blur-md">
    <div class="max-w-xl mx-auto px-6 h-16 flex items-center justify-between">
        <a th:href="@{/lectures/{id}(id=${lecture.id})}" class="text-slate-400 hover:text-slate-900 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </a>
        <span class="font-semibold text-slate-800">결제 및 신청</span>
        <div class="w-5"></div>
    </div>
</nav>

<main class="max-w-xl mx-auto px-6 py-10">
    <div class="bg-white rounded-3xl p-8 shadow-xl shadow-slate-200/50 border border-slate-50">
        <div class="mb-8 text-center">
            <span class="inline-block px-3 py-1 bg-blue-50 text-blue-600 text-[11px] font-bold rounded-full mb-3 uppercase tracking-wider">Confirmed Admission</span>
            <h1 class="text-2xl font-black text-slate-900 mb-2" th:text="${lecture.title}">특강 제목</h1>
            <p class="text-slate-400 text-sm leading-relaxed" th:text="${lecture.openAt} + ' 오픈 특강'">강의 정보</p>
        </div>

        <div class="bg-slate-900 rounded-2xl p-6 mb-8 text-center timer-glow transform transition-all hover:scale-[1.01]">
            <p class="text-slate-400 text-xs mb-2 font-medium">남은 결제 시간</p>
            <p id="remainTime" class="text-4xl font-mono font-bold text-white tracking-widest">10:00</p>
            <div class="w-full bg-slate-800 h-1.5 rounded-full mt-4 overflow-hidden">
                <div id="timerBar" class="bg-blue-500 h-full w-full transition-all duration-1000"></div>
            </div>
        </div>

        <div class="flex justify-between items-center py-4 border-b border-slate-100 mb-6">
            <span class="text-slate-500 font-medium">수강료</span>
            <span class="text-xl font-bold text-slate-900">10,000원</span>
        </div>

        <div class="bg-slate-50 rounded-xl p-4 mb-8">
            <label class="flex items-center gap-3 cursor-pointer group">
                <input id="agree" type="checkbox" class="w-5 h-5 rounded-md border-slate-300 text-blue-600 focus:ring-blue-500 transition-all cursor-pointer">
                <span class="text-sm text-slate-600 group-hover:text-slate-900 transition-colors leading-tight">
                    (필수) 취소 규정 및 이용 약관에 동의합니다.
                </span>
            </label>
        </div>

        <button id="payBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-5 rounded-2xl shadow-lg shadow-blue-200 transition-all active:scale-[0.98] disabled:bg-slate-200 disabled:text-slate-400 disabled:shadow-none mb-4">
            결제하기
        </button>

        <p class="text-center text-[11px] text-slate-400 leading-relaxed">
            시간이 만료되면 대기열 권한이 자동으로 소멸됩니다.<br>신중하고 빠른 결제를 부탁드립니다.
        </p>

        <div id="resultArea" class="hidden mt-6 animate-in fade-in slide-in-from-top-4 duration-300">
            <div id="resultBox" class="rounded-2xl p-4 text-center text-sm font-medium">
                <p id="resultText"></p>
            </div>
        </div>
    </div>
</main>

<script th:inline="javascript">
    const lectureId = [[${lecture.id}]];

    // ✅ 기존 대기열 userKey
    const storageKey = `lecture:${lectureId}:userKey`;

    // ✅ 결제(신청완료) 내역 조회용 userKey
    const enrolledKey = `lecture:${lectureId}:enrolledUserKey`;

    // ✅ 결제 타이머 시작 시각
    const timerKey = `lecture:${lectureId}:applyStartAt`;
    const TTL_MS = 10 * 60 * 1000;

    const remainTimeEl = document.getElementById("remainTime");
    const timerBar = document.getElementById("timerBar");
    const payBtn = document.getElementById("payBtn");
    const resultArea = document.getElementById("resultArea");
    const resultText = document.getElementById("resultText");
    const resultBox = document.getElementById("resultBox");

    const agreeEl = document.getElementById("agree");

    function nowMs(){ return Date.now(); }

    function ensureStartAt() {
      let startAt = localStorage.getItem(timerKey);
      if (!startAt) {
        startAt = String(nowMs());
        localStorage.setItem(timerKey, startAt);
      }
      return Number(startAt);
    }

    function showResult(type, msg){
      resultArea.classList.remove("hidden");
      resultText.innerHTML = msg;
      if(type === 'success') {
          resultBox.className = "bg-green-50 text-green-700 border border-green-100 rounded-2xl p-4 text-center";
      } else {
          resultBox.className = "bg-red-50 text-red-700 border border-red-100 rounded-2xl p-4 text-center";
      }
    }

    function tick(){
      const startAt = ensureStartAt();
      const remain = (startAt + TTL_MS) - nowMs();
      const remainSec = Math.max(0, Math.floor(remain / 1000));

      const m = String(Math.floor(remainSec / 60)).padStart(2, "0");
      const s = String(remainSec % 60).padStart(2, "0");
      remainTimeEl.textContent = `${m}:${s}`;

      const ratio = Math.max(0, (remain / TTL_MS) * 100);
      timerBar.style.width = `${ratio}%`;

      if (remain <= 0) {
        payBtn.disabled = true;
        remainTimeEl.classList.add("text-red-500");
        showResult("fail", "⏰ 시간이 만료되었습니다. 다시 대기열부터 진행해주세요.");
      }
    }

    // ✅ 초기 로드: userKey 없으면 결제 불가
    function getUserKeyOrFail() {
      return localStorage.getItem(storageKey);
    }

    const initialUserKey = getUserKeyOrFail();
    if (!initialUserKey) {
        payBtn.disabled = true;
        showResult("fail", "입장권이 없습니다. 상세 페이지에서 대기열을 거쳐주세요.");
    } else {
        tick();
        setInterval(tick, 1000);
    }

    payBtn.addEventListener("click", () => {
        const userKey = getUserKeyOrFail();
        if (!userKey) {
            payBtn.disabled = true;
            showResult("fail", "입장권이 없습니다. 상세 페이지로 돌아가 다시 진행해주세요.");
            return;
        }

        if (!agreeEl.checked) {
            showResult("fail", "필수 약관에 동의해주세요.");
            return;
        }

        payBtn.disabled = true;
        payBtn.innerText = "처리 중...";

        fetch(`/api/lectures/${lectureId}/enroll?userKey=${encodeURIComponent(userKey)}`, { method: "POST" })
        .then(res => res.json())
        .then(data => {
            if (data.status === "ENROLLED" || data.status === "ALREADY_ENROLLED") {

                // ✅ receipt 페이지에서 조회할 수 있도록 userKey를 '완료용'으로 보관
                localStorage.setItem(enrolledKey, userKey);

                // ✅ 대기열/결제 타이머용 키 정리
                localStorage.removeItem(storageKey);
                localStorage.removeItem(timerKey);

                showResult("success", "✅ 결제가 완료되었습니다. 신청 내역으로 이동합니다...");
                payBtn.innerText = "완료";

                // ✅ 신청 내역(영수증) 페이지로 이동
                setTimeout(() => {
                    location.href = `/lectures/${lectureId}/receipt`;
                }, 600);

            } else {
                showResult("fail", "처리에 실패했습니다. 다시 대기열부터 시도해주세요.");
                payBtn.disabled = false;
                payBtn.innerText = "결제하기";
            }
        }).catch(() => {
            showResult("fail", "서버 오류가 발생했습니다.");
            payBtn.disabled = false;
            payBtn.innerText = "결제하기";
        });
    });
</script>
</body>
</html>
