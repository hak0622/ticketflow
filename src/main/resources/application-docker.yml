spring:
  datasource:
    url: jdbc:mysql://mysql:3306/blog?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        default_batch_fetch_size: 100

  data:
    redis:
      host: redis
      port: 6379

oauth2:
  redirect-url: ${FRONTEND_URL:http://localhost:8080}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: blog-concert