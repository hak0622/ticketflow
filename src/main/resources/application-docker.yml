spring:
  datasource:
    url: jdbc:mysql://mysql:3306/blog?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      connection-timeout: 3000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        default_batch_fetch_size: 100

  data:
    redis:
      host: redis
      port: 6379

  session:
    store-type: redis
    timeout: 30m

server:
  forward-headers-strategy: framework
  tomcat:
    threads:
      max: 100
    accept-count: 500
    max-connections: 2000

spring:
  security:
    oauth2:
      client:
        registration:
          google:
            redirect-uri: "${FRONTEND_URL:http://localhost:8080}/login/oauth2/code/google"

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  test-support:
    enabled: ${TEST_SUPPORT_ENABLED:false}
    user-count: ${TEST_SUPPORT_USER_COUNT:10000}
    token-expiration-minutes: 120
    csv-output-path: booking-users.csv

oauth2:
  redirect-url: ${FRONTEND_URL:http://localhost:8080}

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: blog-concert
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests:
          - 100ms
          - 300ms
          - 500ms
          - 1s
          - 3s
          - 5s
