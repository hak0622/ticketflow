spring:
  datasource:
    url: ${DB_URL}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  data:
    redis:
      host: localhost
#      port: 6379
      port: 6380
jwt:
  secret_key: ${JWT_SECRET_KEY}

oauth2:
  redirect-url: http://localhost:5173

app:
  frontend-url: http://localhost:5173
  test-support:
    enabled: true
    user-count: 500
    email-prefix: test
    email-domain: test.com
    default-password: password123!
    nickname-prefix: test-user-
    csv-output-path: booking-users.csv
    token-expiration-minutes: 120
    seed-emails:
      - test1@test.com
      - test2@test.com
      - test3@test.com
