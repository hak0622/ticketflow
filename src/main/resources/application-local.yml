spring:
  datasource:
    url: ${DB_URL}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret_key: ${JWT_SECRET_KEY}

oauth2:
  redirect-url: http://localhost:5173

app:
  test-support:
    enabled: true
    token-expiration-minutes: 120
    seed-emails:
      - test1@test.com
      - test2@test.com
      - test3@test.com
